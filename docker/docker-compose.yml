# OpenAnim Renderer Services
# Each service is a self-contained Docker container for one rendering provider.
#
# Usage:
#   Build all:          docker-compose build
#   Build one:          docker-compose build manim
#   Run ad-hoc render:  docker-compose run --rm manim manim render scene.py GeneratedScene ...

version: '3.9'

x-common-volumes: &common-volumes
  volumes:
    - /tmp/openanim:/workspace   # shared temp dir — engine mounts work here

services:

  manim:
    build:
      context: .
      dockerfile: Dockerfile.manim
    image: openanim/manim:latest
    <<: *common-volumes

  mermaid:
    build:
      context: .
      dockerfile: Dockerfile.mermaid
    image: openanim/mermaid:latest
    <<: *common-volumes

  ffmpeg:
    build:
      context: .
      dockerfile: Dockerfile.ffmpeg
    image: openanim/ffmpeg:latest
    <<: *common-volumes

  remotion:
    build:
      context: .
      dockerfile: Dockerfile.remotion
    image: openanim/remotion:latest
    environment:
      - REMOTION_CHROME_EXECUTABLE=/usr/bin/chromium
    <<: *common-volumes
